name: Service Provider Web
version: 1.0.0
services:
  web-app:
    container_name: web-app
    image: node:18-alpine
    ports:
      - 3000:3000
    working_dir: /app
    environment:
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: "false"
    volumes:
      - ./app/web:/app
    command: sh -c "npm install && npm start"
