map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Docker embedded DNS — defer upstream resolution so nginx starts when `api` /
# `temporal-ui` are not running (Compose profile `web`).
resolver 127.0.0.11 valid=10s ipv6=off;

upstream next_upstream {
  server web:3000;
}

server {
  listen 80 default_server;
  server_name _;
  return 301 https://panda-massage.com$request_uri;
}

server {
  listen 80;
  server_name panda-massage.com www.panda-massage.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name panda-massage.com www.panda-massage.com;
  client_max_body_size 2m;

  ssl_certificate     /etc/letsencrypt/live/panda-massage.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/panda-massage.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  location /api/ {
    set $api_upstream http://api:3001;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /temporal/ {
    rewrite ^/temporal/(.*)$ /$1 break;
    set $temporal_ui_upstream http://temporal-ui:8080;
    proxy_pass $temporal_ui_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://next_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
