map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Docker embedded DNS — defer upstream resolution so nginx starts when `api` /
# `temporal-ui` are not running (Compose profile `web`).
resolver 127.0.0.11 valid=10s ipv6=off;

upstream next_upstream {
  server web:3000;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 2m;

  location /api/ {
    set $api_upstream http://api:3001;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /temporal/ {
    rewrite ^/temporal/(.*)$ /$1 break;
    set $temporal_ui_upstream http://temporal-ui:8080;
    proxy_pass $temporal_ui_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://next_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
