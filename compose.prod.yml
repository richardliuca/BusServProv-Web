name: busservprov

services:
  nginx:
    profiles:
      - production
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt_certs:/etc/letsencrypt:ro

  certbot:
    profiles:
      - production
    image: docker.io/certbot/dns-cloudflare:latest
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - ./infra/secrets/cloudflare.ini:/etc/letsencrypt/cloudflare.ini:ro

volumes:
  letsencrypt_certs:
